<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#6b5b4f" />
    <title>Sin conexión · Studio Pilates RF</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fdf6f6 0%, #f8f8f8 100%);
        color: #1a1a1a;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #6b6b6b;
      }

      button {
        margin-top: 1.5rem;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.25rem;
        background: #1a1a1a;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>
        No hay internet en este momento. Podés volver a intentar cuando recuperes la señal.
        Las pantallas ya visitadas pueden seguir disponibles.
      </p>
      <button type="button" onclick="window.location.reload()">Reintentar</button>
    </main>
  </body>
</html>
